name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: blackpolar.org
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/blackpolar

            git pull origin main
            npm ci --omit=dev
            mkdir -p logs
            pm2 reload ecosystem.config.cjs --env production