# Nginx Configuration - Production with HTTPS/SSL
#
# IMPORTANTE: Reemplaza "midominio.com" con tu dominio real
#
# Pasos previos:
# 1. Tener dominio apuntando al servidor
# 2. Instalar certbot: sudo apt install certbot python3-certbot-nginx
# 3. Generar certificates: sudo certbot certonly --nginx -d midominio.com -d *.midominio.com
# 4. Poner esta config en /etc/nginx/sites-available/black-polar
# 5. Crear enlace: sudo ln -s /etc/nginx/sites-available/black-polar /etc/nginx/sites-enabled/
# 6. Validar: sudo nginx -t
# 7. Recargar: sudo systemctl reload nginx
# 8. Auto-renew: sudo certbot renew --dry-run

# Rate Limiting (protección contra ataques)
limit_req_zone $binary_remote_addr zone=main_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Upstream Configuration
upstream main_app {
    # múltiples servidores para balanceo de carga
    server localhost:3000 weight=1;
    # server 192.168.1.10:3000 weight=1;
    keepalive 32;
}

upstream portfolios_app {
    server localhost:4000 weight=1;
    keepalive 32;
}

upstream tlm_app {
    server localhost:5000 weight=1;
    keepalive 32;
}

# ============================================
# HTTP → HTTPS Redirect
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name midominio.com www.midominio.com portfolios.midominio.com tlm.midominio.com;

    # Permitir validación de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir todo a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================
# MAIN APP - midominio.com
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name midominio.com www.midominio.com;

    # ========== SSL Configuration ==========
    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/midominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/midominio.com/privkey.pem;

    # SSL Protocols y Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # SSL Stapling (verificación de certificado)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS - Forzar HTTPS (cuidado, es permanente)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========== Security Headers ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ========== Logging ==========
    access_log /var/log/nginx/main_access.log combined;
    error_log /var/log/nginx/main_error.log warn;

    # ========== Gzip Compression ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;

    # ========== Proxy Configuration ==========
    location / {
        # Rate limiting
        limit_req zone=main_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass http://main_app;
        proxy_http_version 1.1;

        # Connection upgrade (WebSocket support)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers importantes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ========== Static Files (Cache) ==========
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|eot|otf|woff|woff2|ttf|webp)$ {
        proxy_pass http://main_app;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== Health Check ==========
    location /health {
        proxy_pass http://main_app;
        access_log off;
    }
}

# ============================================
# PORTFOLIOS APP - portfolios.midominio.com
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portfolios.midominio.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/midominio.com/fullchain.pem;
