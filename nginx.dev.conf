# Nginx Configuration - Development/Local Testing
# 
# Ubicación típica:
#   Windows: usar WSL o nginx standalone
#   macOS: /usr/local/etc/nginx/nginx.conf
#   Linux: /etc/nginx/nginx.conf o /etc/nginx/sites-available/
#
# Después de editar, validar y recargar:
#   nginx -t              # Validar sintaxis
#   sudo systemctl restart nginx   # Recargar config

# Define donde están nuestras apps Node.js
upstream main_app {
    server localhost:3000;
    keepalive 32;
}

upstream portfolios_app {
    server localhost:4000;
    keepalive 32;
}

upstream tlm_app {
    server localhost:5000;
    keepalive 32;
}

# ============================================
# HTTP - Redireccionar a HTTPS (en producción)
# ============================================
server {
    listen 80;
    server_name midominio.local portfolios.midominio.local tlm.midominio.local;
    
    # En desarrollo, servir HTTP directamente
    # En producción: return 301 https://$server_name$request_uri;
    
    # Redirigir todo a HTTPS en producción (descomenta)
    # return 301 https://$server_name$request_uri;
    
    # En desarrollo, servir directamente
    location / {
        # Redirigir según el dominio
        if ($host = midominio.local) {
            proxy_pass http://main_app;
        }
        if ($host = portfolios.midominio.local) {
            proxy_pass http://portfolios_app;
        }
        if ($host = tlm.midominio.local) {
            proxy_pass http://tlm_app;
        }
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================
# Configuración alternativa (sin usar upstream)
# ============================================

# Main App - midominio.local
server {
    listen 80;
    server_name midominio.local www.midominio.local;

    # Logging
    access_log /var/log/nginx/main_access.log;
    error_log /var/log/nginx/main_error.log;

    # Compresión gzip (opcional pero recomendado)
    gzip on;
    gzip_types text/plain text/css text/javascript application/json;

    location / {
        proxy_pass http://main_app;
        proxy_http_version 1.1;
        
        # Mantener WebSocket vivo
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers importantes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Servir archivos estáticos sin proxy (opcional para velocidad)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|eot|otf|woff|woff2|ttf)$ {
        alias /var/www/black-polar/src/apps/main/public/;
        expires 30d;
        log_not_found off;
    }
}

